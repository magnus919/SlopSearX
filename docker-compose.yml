# SlopSearX — drop-in replacement for SearXNG in GroktoCrawl stack
# Runs on the groktocrawl stack's network so agent-svc can reach it.
# No host port — internal-only for the stack.

services:
  slopsearx:
    build: .
    image: slopsearx:0.1.0
    ports:
      - "8080"
    env_file:
      - ../.env
    environment:
      - VALKEY_URL=redis://valkey:6379/0
    restart: unless-stopped

networks:
  default:
    name: groktocrawl_default
    external: true
