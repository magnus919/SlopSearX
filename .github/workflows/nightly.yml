name: Nightly

on:
  schedule:
    - cron: "0 4 * * *" # Every day at 04:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  duplicate-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect duplicate code with jscpd
        run: npx jscpd --min-tokens 50 --min-lines 5 --threshold 25 slopsearx/ engines/

  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Large file detection
        run: |
          echo "Checking for files over 200KB..."
          find . -name '*.py' -size +200k | sed 's/^/WARNING: /' | tee /tmp/large_files.txt
          if [ -s /tmp/large_files.txt ]; then
            echo "Large Python files detected (over 200KB). Consider splitting."
          fi
      - name: TODO/FIXME scan
        run: |
          echo "Scanning for TODO/FIXME/HACK markers..."
          rg -n 'TODO|FIXME|HACK' slopsearx/ engines/ || echo "No markers found."
      - name: Validate AGENTS.md dev setup
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import slopsearx; print('Import OK')"
          pytest --collect-only -q
      - name: Dependency vulnerability scan
        run: pip-audit -r requirements-dev.txt

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy slopsearx/ engines/

      - name: Complexity analysis with radon
        run: radon cc slopsearx/ engines/ --total-average

      - name: Maintainability index with radon
        run: radon mi slopsearx/ engines/

      - name: Dead code check with vulture
        run: vulture slopsearx/ engines/

      - name: Architecture check with import-linter
        run: lint-imports

      - name: Unused dependency check with deptry
        run: deptry . --per-rule-ignores "DEP002=lxml|uvicorn|pytest|pytest-asyncio|ruff|cssselect|mypy|pytest-cov|pip-tools|pre-commit|radon|vulture|import-linter|deptry|pip-audit,DEP003=starlette"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test with pytest and coverage
        run: pytest -v --durations=10 --cov=slopsearx --cov=engines --cov-report=term-missing --cov-report=html --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
