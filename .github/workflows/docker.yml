name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/magnus919/slopsearx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and load image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get primary image tag
        id: tag
        run: echo "ref=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Smoke test container
        run: |
          docker run -d --name slopsearx-smoke -p 8080:8080 ${{ steps.tag.outputs.ref }}
          sleep 3
          curl -f --retry 5 --retry-delay 2 http://localhost:8080/health
          docker stop slopsearx-smoke
          docker rm slopsearx-smoke

      - name: Push to registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            docker push "$tag"
          done

      - name: Prune untagged versions
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "Pruning untagged versions of slopsearx"
          gh api \
            --method GET \
            "/users/magnus919/packages/container/slopsearx/versions?per_page=100" \
            --jq '.[] | select(.metadata.container.tags == null or .metadata.container.tags == []) | .id' \
            | while read version_id; do
              echo "  Deleting version $version_id"
              gh api --method DELETE \
                "/users/magnus919/packages/container/slopsearx/versions/$version_id" --silent
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
