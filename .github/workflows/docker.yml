name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/magnus919/slopsearx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prune untagged versions
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "Pruning untagged versions of slopsearx"
          gh api \
            --method GET \
            "/users/magnus919/packages/container/slopsearx/versions?per_page=100" \
            --jq '.[] | select(.metadata.container.tags == null or .metadata.container.tags == []) | .id' \
            | while read version_id; do
              echo "  Deleting version $version_id"
              gh api --method DELETE \
                "/users/magnus919/packages/container/slopsearx/versions/$version_id" --silent
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
