name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  duplicate-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Detect duplicate code with jscpd
        run: npx jscpd --min-tokens 50 --min-lines 5 --threshold 0 slopsearx/ engines/ 2>&1 || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy slopsearx/ engines/

      - name: Complexity analysis with radon
        run: radon cc slopsearx/ engines/ --total-average

      - name: Maintainability index with radon
        run: radon mi slopsearx/ engines/

      - name: Dead code check with vulture
        run: vulture slopsearx/ engines/

      - name: Architecture check with import-linter
        run: lint-imports

      - name: Test with pytest and coverage
        run: pytest -v --cov=slopsearx --cov=engines --cov-report=term-missing --cov-fail-under=70
